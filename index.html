<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;min-height:100dvh;background:linear-gradient(160deg,#FDF6E3 0%,#FFFCF0 60%,#FDF6E3 100%);font-family:'Nunito',sans-serif;color:#1C1008;-webkit-tap-highlight-color:transparent}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Title Screen */
.title-scr{max-width:560px;margin:0 auto;padding:3rem 1.5rem;text-align:center;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tstar{font-size:72px;line-height:1;margin-bottom:1.25rem;animation:float 3.5s ease-in-out infinite}
.tlabel{font-family:'Bubblegum Sans',cursive;font-size:.9rem;color:#D97706;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem}
.ttitle{font-family:'Bubblegum Sans',cursive;font-size:clamp(1.8rem,6vw,2.8rem);color:#14532D;line-height:1.2;margin-bottom:1rem}
.tdiv{width:60px;height:3px;background:#D97706;border-radius:2px;margin:0 auto 1.25rem}
.tded{font-family:'Lora',serif;font-style:italic;color:#4B2E1A;font-size:1rem;line-height:1.7;margin-bottom:2rem}
.thow{background:white;border:2px solid #E8D5A3;border-radius:16px;padding:1rem 1.25rem;margin-bottom:2rem;font-size:.88rem;color:#78523A;line-height:1.7;text-align:left}
.thow strong{color:#4B2E1A}
.tbtn{width:100%;padding:1.2rem;background:linear-gradient(135deg,#166634,#15803D);color:white;border:none;border-radius:18px;font-size:1.3rem;font-weight:800;font-family:'Bubblegum Sans',cursive;cursor:pointer;box-shadow:0 5px 20px rgba(22,101,52,.38);-webkit-tap-highlight-color:transparent}
.tbtn:active{transform:scale(.97)}

/* Reader */
.reader{max-width:620px;margin:0 auto;padding:1rem 1rem 3rem;animation:fadeUp .4s ease}
.topbar{display:flex;align-items:center;gap:.6rem;margin-bottom:1.25rem;padding-bottom:.9rem;border-bottom:2px solid #E8D5A3}
.bnav{background:none;border:2px solid #E8D5A3;border-radius:10px;width:38px;height:38px;cursor:pointer;font-size:1rem;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.bnav:active{background:#E8D5A3}
.pw{flex:1;min-width:0}
.stitle{font-family:'Bubblegum Sans',cursive;color:#14532D;font-size:clamp(.85rem,3vw,1rem);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptrack{height:4px;border-radius:2px;background:#E8D5A3;overflow:hidden;margin-top:4px}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#15803D,#D97706);transition:width .3s}
.pbw{display:flex;justify-content:center;margin-bottom:.75rem}
.pb{background:#14532D;color:white;font-family:'Bubblegum Sans',cursive;font-size:1rem;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center}

/* Illustration */
.imgbox{border-radius:12px;overflow:hidden;margin-bottom:1.25rem;box-shadow:0 3px 14px rgba(0,0,0,.12)}
.imgbox img{width:100%;display:block;max-height:320px;object-fit:cover}
.imgph{border:2px dashed #E8D5A3;border-radius:12px;height:120px;margin-bottom:1.25rem;background:#FFFDF5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.iph-i{font-size:26px;opacity:.35}
.iph-t{font-size:.72rem;color:#78523A;font-weight:600;opacity:.7}

/* Story Card */
.scard{background:white;border-radius:18px;padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 4px 20px rgba(0,0,0,.08);border:2px solid #E8D5A3}
.chap{font-family:'Bubblegum Sans',cursive;color:#14532D;font-size:1.1rem;margin-bottom:.75rem;text-align:center}
.stxt{font-family:'Lora',serif;font-size:clamp(1rem,2.5vw,1.1rem);line-height:1.85}

/* Endings */
.endf{margin-top:1.25rem;padding-top:1rem;border-top:2px solid #E8D5A3;text-align:center}
.endstar{font-family:'Bubblegum Sans',cursive;color:#D97706;font-size:1.6rem;margin-bottom:.5rem}
.endnote{font-family:'Lora',serif;font-style:italic;color:#78523A;font-size:.9rem}

/* Choices */
.clabel{text-align:center;font-family:'Bubblegum Sans',cursive;color:#4B2E1A;font-size:1rem;margin-bottom:.75rem}
.choices{display:flex;flex-direction:column;gap:.65rem}
.cbtn{border:none;border-radius:13px;padding:1rem 1.25rem;font-size:1rem;font-weight:700;display:flex;align-items:center;gap:.75rem;cursor:pointer;width:100%;text-align:left;color:white;box-shadow:0 4px 14px rgba(0,0,0,.2);font-family:'Nunito',sans-serif;-webkit-tap-highlight-color:transparent}
.cbtn:active{transform:scale(.97)}
.cnum{background:rgba(255,255,255,.18);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:'Bubblegum Sans',cursive;font-size:1rem;flex-shrink:0}
.btn-cont{width:100%;padding:.85rem;background:#166634;color:white;border:none;border-radius:13px;font-size:1rem;font-weight:800;font-family:'Bubblegum Sans',cursive;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);-webkit-tap-highlight-color:transparent}
.btn-cont:active{transform:scale(.97)}

/* End Actions */
.end-acts{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:.5rem}
.btn-rs{padding:.9rem;background:#166634;color:white;border:none;border-radius:13px;font-size:1rem;font-weight:800;font-family:'Bubblegum Sans',cursive;cursor:pointer}
.btn-bk{padding:.9rem;background:linear-gradient(135deg,#92400E,#D97706);color:white;border:none;border-radius:13px;font-size:1rem;font-weight:800;font-family:'Bubblegum Sans',cursive;cursor:pointer}
</style>

var STORY = {"title": "The Monster in Jordan’s Closet", "heroName": "Jordan", "dedication": "For Jordan — who is brave enough to open any door, clever enough to solve any puzzle, and kind enough to help whoever is on the other side.", "passages": {"start": {"text": "Jordan woke up at 11:47 PM — she knew because she always checked the clock first, like a scientist recording data — to a sound coming from inside her closet.\nTHUMP. THUMP. BUMP.\nThe door wobbled. A thin stripe of golden light glowed underneath it.\nThen the thumping stopped. And Jordan heard something new: a tiny, sad sniffle. Like someone trying very, very hard not to cry.\nShe sat up. She did not pull the covers over her head. She did not call for Dad. She pushed back her blankets, set both feet on the cold floor, and listened.", "choices": [{"text": "Tiptoe to the closet and peek inside alone", "next": "meet_barnaby_brave"}, {"text": "Go wake up Kellan for backup", "next": "meet_barnaby_team"}]}, "meet_barnaby_brave": {"text": "Jordan crossed the room in four careful steps, avoiding the squeaky floorboard near her bookshelf. She put her hand on the closet doorknob. It was warm. That was peculiar — which was a word she had learned last Tuesday and had been waiting to use.\nShe turned the knob and pulled.\nSitting on top of her rain boots was the most enormous creature she had ever seen. He was round and soft like a giant blueberry, covered in shaggy blue-and-purple fur, with two big yellow eyes and tiny little horns that were barely bigger than gumdrops. He was sniffling into his paws.\n“Oh no,” the monster whispered. “I came through the wrong door. I’m Barnaby, and I am completely, totally, absolutely lost.”\nHe did not seem scary. He seemed like somebody who needed help.\nJordan knelt down beside him and put on her most professional voice.\n“I’m Jordan. I’m seven, but I read at a third-grade level. Tell me everything.”\nKellan appeared in the doorway in his dinosaur pajamas. He stared at Barnaby with enormous brown eyes.\n“Cool,” he said.", "choices": [{"text": "Ask Barnaby how he got here", "next": "first_door"}]}, "meet_barnaby_team": {"text": "Jordan crept down the hallway and shook Kellan’s shoulder.\n“Something’s in my closet,” she whispered. “I need backup.”\nKellan’s eyes popped open. He did not ask questions. He did not ask what kind of something. He grabbed his toy flashlight — the one no bigger than a lip gloss — and followed her. Which was exactly the kind of thing Kellan did.\nThey stood in front of the closet. Jordan held up three fingers. Three. Two. One. They pulled the door open together.\nSitting on top of Jordan’s rain boots was the most enormous creature they had ever seen — round and soft, covered in shaggy blue-and-purple fur, with big yellow eyes and tiny gumdrop horns. He was sniffling into his paws.\n“Oh no,” the monster whispered. “I came through the wrong door. I’m Barnaby, and I am completely, totally, absolutely lost.”\nKellan shined the flashlight directly into Barnaby’s face. Barnaby blinked. Sneezed. His whole fur puffed out like a purple dandelion.\nKellan grinned. “Cool.”\nJordan knelt down. “I’m Jordan. This is my brother Kellan. Tell us everything.”", "choices": [{"text": "Ask Barnaby how he got here", "next": "first_door"}]}, "first_door": {"text": "Barnaby held up a golden doorknob that flickered with pale, tired light.\n“This doorknob opens doors to anywhere,” he explained, wiping his nose on his fur, which was a little bit gross but Jordan decided not to mention it. “But it’s running out of power. I need three giggle gems to recharge it. They’re crystals powered by laughter — real, true, from-your-belly laughter.”\nHe pressed the doorknob against Jordan’s bedroom wall. Two glowing doors appeared with a soft hum. The one on the left was bright pink and smelled like birthday cake. The one on the right was fluffy white and felt as soft as a pillow when Jordan touched it.\n“Each world has a giggle gem hidden somewhere,” said Barnaby. “But you have to make someone laugh to find it.”\nJordan grabbed her backpack — the one with her first aid kit, a notebook, and a granola bar. She checked the zipper twice. Kellan was already bouncing on his toes.", "choices": [{"text": "Open the pink sugary door", "next": "candy_land"}, {"text": "Open the fluffy white door", "next": "cloud_land"}]}, "candy_land": {"text": "They stepped through the pink door and Jordan’s mouth fell open so wide that Kellan poked her chin to close it.\nA whole world made of candy. The trees were enormous twisty lollipops with gummy leaves. The grass was soft green gummy strips that squished under their feet. A wide river of melted chocolate flowed past boulders of gingerbread, and the sky above them was the color of cotton candy — pink and gold and lavender, all at the same time.\n“The giggle gem is somewhere across that river,” said Barnaby, pointing.\nBut the bridge — a long, flat wafer cookie — had cracked and collapsed into the chocolate. On the other side, a group of tiny gummy bears jumped up and down, waving their little arms like they were trying to hail a taxi.\nJordan noticed a sign near the broken bridge. She leaned down and read it aloud:\n“WARNING — MARSHMALLOW BOG TO THE LEFT. VERY STICKY. DO NOT WALK.”\nShe straightened up.\n“Good thing I can read that,” she said. “We definitely need to go right.”\nThat was very high praise from Jordan. For herself.", "choices": [{"text": "Wade carefully into the chocolate river", "next": "candy_river"}, {"text": "Build something to cross the river", "next": "build_candy_raft"}]}, "candy_river": {"text": "Jordan dipped one finger in the chocolate, tasted it, and nodded.\n“Warm. Thick. Not too deep,” she reported.\nShe rolled up her pajama pants and stepped in. Kellan jumped in right after her — SPLASH! — because Kellan had never once in his life entered water carefully.\nA wave of chocolate flew up and landed all over Barnaby’s face. Barnaby sneezed so hard that his fur puffed out in every direction like a giant purple pom-pom.\nThen Kellan slipped and sat down with a tremendous SPLAT — covered in chocolate from his hair to his dinosaur pajamas, grinning his biggest grin. The gummy bears laughed so hard they toppled over like little dominoes.\nA golden gem floated up out of the chocolate, glowing and warm. Their first giggle gem.\nBarnaby opened three new doors on a lollipop tree — one covered in pillows, one no bigger than a shoebox, and one made of old leather book covers.", "choices": [{"text": "Open the pillow-covered door", "next": "pillow_land"}, {"text": "Open the tiny shoebox door", "next": "tiny_land"}, {"text": "Open the door made of book covers", "next": "library_land"}]}, "build_candy_raft": {"text": "Jordan studied the riverbank and her eyes got that look — the one where you could practically see the plan forming behind them.\n“We need flat pieces for the bottom, and something to tie them together,” she said.\nShe found wide, flat cookie pieces stacked near the bank. Kellan discovered that the red licorice vines growing nearby were perfect for rope. He pulled them down and twisted them tight with his hands, testing the knots by yanking as hard as he could, which was actually pretty hard for a four-year-old.\nThey lashed the cookies together into a sturdy raft.\nBarnaby tried to help by sitting on it. CRACK. It split right in half under his fluffy bottom.\n“Oops,” said Barnaby, looking at the two cookie halves floating apart beneath him.\nThe gummy bears on the far bank burst out laughing. Jordan pressed both hands over her face for exactly one second.\nThen she built a bigger, stronger raft and convinced Barnaby to paddle alongside instead of riding on top. As they all laughed together, a golden giggle gem rose from the chocolate river, glowing and warm. Their first giggle gem.\nBarnaby opened three new doors on a lollipop tree — one covered in pillows, one no bigger than a shoebox, and one made of old leather book covers.", "choices": [{"text": "Open the pillow-covered door", "next": "pillow_land"}, {"text": "Open the tiny shoebox door", "next": "tiny_land"}, {"text": "Open the door made of book covers", "next": "library_land"}]}, "cloud_land": {"text": "They stepped through the white door and into a world made entirely of clouds.\nThe ground bounced under their feet like a trampoline. Cloud-trees swayed in a breeze that smelled like rain and clean laundry, and in the distance, a tall tower spiraled up into a golden sky.\n“The giggle gem is up high somewhere,” said Barnaby.\nKellan immediately started bouncing — higher and higher, his little legs pumping so fast he was practically a blur — until he tumbled sideways into a cloud bush and popped up looking like a very small, very startled snowman.\n“I’m okay!” he announced.\nTwo paths ahead. One led to an enormous curving slide. The other wound up toward the tower.", "choices": [{"text": "Take the giant cloud slide upward", "next": "cloud_slide"}, {"text": "Climb the tall cloud tower", "next": "climb_cloud_tower"}]}, "cloud_slide": {"text": "The slide was magnificent — a giant spiral of smooth, shiny cloud that curled up and up into the golden sky. The trick was that they had to climb UP the slide to reach the top.\n“We have to go up a slide?” asked Kellan, staring at it.\n“Up,” confirmed Barnaby.\nKellan scrambled up on his hands and knees like a gecko, fast and fearless, because the idea of going the wrong direction on a slide was basically his whole personality. Jordan climbed steady and careful, finding footholds in the curves.\nBut poor Barnaby kept sliding back down on his fluffy belly, spinning in circles as he went. He looked like a giant blueberry in a waterslide — going the wrong way.\nKellan laughed so hard he lost his grip and slid all the way back down, bonking right into Barnaby at the bottom. They tumbled into a heap of fur and pajamas.\n“HEY!” Kellan shouted from somewhere underneath Barnaby’s belly. “Great news! My bottom is ALL BETTER!”\nA golden giggle gem appeared at the top of the slide, shining like a tiny sun. Jordan climbed up and grabbed it.\nBarnaby pressed the doorknob against a cloud-tree and opened three new doors — one covered in pillows, one no bigger than a shoebox, and one made of old leather book covers.", "choices": [{"text": "Open the pillow-covered door", "next": "pillow_land"}, {"text": "Open the tiny shoebox door", "next": "tiny_land"}, {"text": "Open the door made of book covers", "next": "library_land"}]}, "climb_cloud_tower": {"text": "The cloud tower had a staircase inside that wound round and round. Every single step made a different silly sound.\nSQUEAK. BOING. HONK. TOOT.\nKellan stomped on every one as hard as he could. SQUEAK-BOING-HONK-TOOT! Then he ran back down and did it again. Then again. He would have done it a fourth time, but Jordan grabbed his arm.\nAt the very top they found a small cloud-bird sitting alone on a nest. One of her wings was bent at a funny angle.\n“Ouch,” she said sadly. “I hurt my wing, and nobody ever visits me up here.”\nJordan knelt down, opened her backpack, and examined the wing carefully. She wrapped it gently with a bandage from her first aid kit — not too tight, not too loose.\n“Keep it still for a while,” she said, in the voice she used when she was being a doctor, which was her most serious voice. “You are going to be totally fine.”\nThe cloud-bird looked down at her bandaged wing. Then up at Jordan. Then down at her wing again. Then she started to cry happy tears.\nThen Kellan did his stomping dance one more time, just for her — SQUEAK-BOING-HONK-TOOT! She laughed so hard a golden giggle gem tumbled right out of her nest.\nBarnaby pressed the doorknob against a cloud-tree and opened three new doors — one covered in pillows, one no bigger than a shoebox, and one made of old leather book covers.", "choices": [{"text": "Open the pillow-covered door", "next": "pillow_land"}, {"text": "Open the tiny shoebox door", "next": "tiny_land"}, {"text": "Open the door made of book covers", "next": "library_land"}]}, "pillow_land": {"text": "They stepped through the pillow-covered door and landed — FWUMP — on the softest mountain of pillows Jordan had ever felt.\nPillow Land was extraordinary. The houses were built from stacked cushions. The trees had trunks made of rolled-up blankets and leaves made of soft fleece. There was even a river of pillows you could float down without getting wet at all.\nA group of fluffy pillow creatures waddled toward them on short, stubby legs. They had big round bodies, tiny button eyes, and extremely worried expressions.\n“Please help!” squeaked the tallest one, who came up to about Jordan’s knee. “Our queen’s favorite pillow has gone missing. She can’t sleep without it, and when she can’t sleep, she gets the hiccups. And when she gets the hiccups, the whole land BOUNCES.”\nRight on cue — HIC! The ground jumped like a trampoline. Kellan flew straight up into the air, flipped once, and landed flat on his back on a giant cushion.\nHe grinned up at the sky like that was exactly what he’d been hoping would happen.", "choices": [{"text": "Build the queen something even better", "next": "pillow_fort"}, {"text": "Ride the hiccups to find the lost pillow", "next": "pillow_bounce"}]}, "pillow_fort": {"text": "Jordan got a look on her face — the one where you could practically see the plan forming behind her eyes.\n“What if she doesn’t need that old pillow at all?” she said. “What if we build her something so magnificent she forgets all about it?”\nShe pulled out her notebook and drew a quick plan showing where the towers and tunnels should go, complete with labels. Kellan hauled pillows at top speed, stacking them higher and higher. Barnaby tried to carry pillows too, but his arms were too short for his round body, and they kept bouncing off his head. The pillow creatures giggled every time.\nWhen they finished, it was the most spectacular pillow fort in the history of the universe. Four towers. Two tunnels. A secret room. A cozy center chamber piled high with the fluffiest pillows in all of Pillow Land.\nThe queen waddled in — a big round pillow creature wearing a tiny golden crown that kept sliding over one button eye. She looked around. She gasped. She lay down in the fluffy middle and let out the most contented sigh Jordan had ever heard.\nHer hiccups stopped instantly. The pillow creatures cheered, and a golden giggle gem rolled out from under the biggest pillow. Their second gem!", "choices": [{"text": "Head through the golden door to find the last gem", "next": "final_door_pillow"}]}, "pillow_bounce": {"text": "“Let’s ride the hiccups!” said Kellan, and before anyone could point out that this was not a real plan, he was already bouncing.\nEvery time the queen hiccupped — HIC! — the whole ground jumped, and they bounced in the direction of the missing pillow. Kellan bounced the highest because he was the lightest, soaring up like a rubber ball. Barnaby bounced the funniest because he was so round and fluffy that he spun in the air each time, his little horns twirling.\nJordan kept her eyes on the horizon. There. She spotted it — the queen’s pillow, wedged in the top branches of a tall pillow-tree.\nShe calculated the timing. She watched one bounce. Two bounces. Three.\n“Wait for the next big one,” she told Kellan.\nHIC! The ground launched them up, and Jordan stretched as high as she could and snatched the pillow from the tree.\nThe queen hugged her favorite pillow, her hiccups stopped at once, and she laughed a warm, bubbly laugh.\n“You bounced all the way there and back!”\nA golden giggle gem appeared, glowing in Jordan’s hand. Their second gem!", "choices": [{"text": "Head through the golden door to find the last gem", "next": "final_door_pillow"}]}, "tiny_land": {"text": "The door was no bigger than a shoebox. When they stepped through it, something extraordinary happened — they shrank. Jordan, Kellan, and Barnaby were suddenly no bigger than mice.\nTiny Land was a hidden world tucked under a giant mushroom cap. Flowers that were normally small now towered above them like skyscrapers. A ladybug the size of a horse flew past and nearly knocked Kellan over with the breeze from its wings. He did not seem bothered by this.\nLittle beetle-people lived in houses made from hollowed-out acorns and drove cars built from walnut shells. A cheerful beetle wearing a tiny top hat and a monocle scurried over to greet them.\n“Welcome, welcome!” he said, adjusting his monocle importantly. “I’m Mayor Bumbleton. We’re having our Annual Walnut Derby today, but half our racers caught the sniffles and can’t compete. We need more drivers!”\nHe looked them up and down. Then up again.\n“You’re... rather young,” he said. “Even by mouse standards.”\n“I’m four,” said Kellan.\n“Right,” said Mayor Bumbleton, in the voice of someone who had decided not to ask any follow-up questions. “Will you help?”", "choices": [{"text": "Race in the Walnut Derby", "next": "tiny_race"}, {"text": "Help build a better racetrack first", "next": "tiny_village"}]}, "tiny_race": {"text": "Kellan jumped into a walnut-shell car and immediately started examining the steering. It had a tiny wheel connected to a vine-string system that turned the front axle, which was made from a toothpick.\nHe tugged the vine left. The wheels turned left. He tugged right. The wheels turned right.\n“Oh, I get it,” he said, and he did. He had figured out the whole mechanism in about four seconds.\nJordan climbed into her own walnut car. Barnaby squeezed into a third one, but even at mouse-size his fluffy bottom stuck out the top like a muffin overflowing its wrapper.\nThe race began! Kellan zoomed into the lead, pulling his vine-steering with confidence and taking every turn at full speed. Jordan drove carefully, finding shortcuts through the tall grass. Barnaby’s car just spun in circles because his fur kept tangling in the wheels.\nFinally he tumbled out of the walnut entirely and rolled across the finish line like a fuzzy bowling ball. The beetle crowd went absolutely wild.\nKellan took a bow. That was very impressive for someone in dinosaur pajamas.\nA golden giggle gem popped up from the racetrack. Their second gem!", "choices": [{"text": "Head through the golden door to find the last gem", "next": "final_door_tiny"}]}, "tiny_village": {"text": "Jordan examined the racetrack and frowned.\n“This track is just a flat circle,” she said. “What if we made it actually fun?”\nKellan grabbed a popsicle stick, snapped it in half to test the thickness, and started stacking before Jordan had even finished the sentence. He didn’t build things the careful, follow-the-instructions way. He built them the pull-it-apart-and-see-how-it-works way — which was actually more useful here.\nTogether they constructed ramps from popsicle sticks angled at just the right slope. A loop-de-loop from a perfectly curled leaf. Kellan tested the curve three times to make sure the cars wouldn’t fall, which was the most patient he’d been about anything all night. They added a tunnel through a hollow acorn.\nThe beetles raced the new track and went sailing off the ramps, spinning through loops, and honking their tiny horns through the tunnel.\nThen Barnaby wanted to try. He squeezed into a walnut car, launched off the first ramp — and got completely, hopelessly stuck inside the acorn tunnel. Only his big yellow eyes and his wiggly little horns poked out from one end.\n“Help?” he said in a tiny voice.\nKellan grabbed one paw. Jordan grabbed the other. They pulled. POP! Barnaby flew out and tumbled three times across the track. Every beetle laughed until they couldn’t breathe.\nA golden giggle gem appeared on top of the acorn. Their second gem!\nKellan rubbed his elbow where he’d tugged too hard. He looked at it thoughtfully. Then he looked up.\n“HEY!” he announced to the entire population of Tiny Land. “Great news! My elbow is ALL BETTER!”", "choices": [{"text": "Head through the golden door to find the last gem", "next": "final_door_tiny"}]}, "library_land": {"text": "The door was made of old leather book covers, and when they pushed it open, the smell of paper and ink and old stories washed over them. Jordan breathed in deep.\nThe Upside-Down Library was the most extraordinary place she had ever seen. Bookshelves as tall as buildings hung upside-down from the ceiling. Books floated gently through the air like butterflies, opening and closing their covers as they flew. Individual words drifted around like fireflies — ADVENTURE glowed green, MYSTERY flickered purple, COURAGE burned gold.\n“I love this place,” Jordan whispered, and her voice only wobbled a tiny bit.\nA small creature that looked like a walking dictionary waddled up to them. He wore reading glasses and had pages for skin.\n“I am the Wordkeeper,” he said with a deep bow. “Our library has a problem. A giggle gem is locked inside the Vault of Forgotten Words, and nobody can solve the puzzle to open it.” He sighed. “We’ve been trying for ages.”\nJordan straightened her backpack straps.\n“How long is ages?” she asked.\n“Seven hundred years,” said the Wordkeeper.\nJordan nodded.\n“Okay. Show me the vault.”\nThe Wordkeeper stared at her over his reading glasses for a very long moment. Then he adjusted them, turned on his heel, and led the way without another word.", "choices": [{"text": "Try the riddle challenge to open the vault", "next": "riddle_room"}, {"text": "Chase down the scrambled words causing trouble", "next": "word_storm"}]}, "riddle_room": {"text": "The Wordkeeper led them to an enormous stone vault with a golden lock shaped like a question mark. Words were carved into the stone above it, but they were jumbled.\nBarnaby squinted. Kellan shrugged. But Jordan stepped forward and studied the letters carefully.\nTANORDRIXAREY.\nShe pulled out her notebook and started rearranging them, crossing them off one by one.\n“Extra... extrard... extraordinary!”\nThe golden lock clicked. Three more riddles appeared on the wall.\n“What has hands but can’t clap?”\nJordan thought. “A clock.” The first bolt unlocked.\n“What gets wetter the more it dries?”\n“A towel!” Kellan shouted. “Mom says that all the time!” The second bolt unlocked.\n“What can you catch but never throw?”\nBarnaby’s eyes went wide. “A cold! Monsters catch colds all the time!” The third bolt unlocked.\nThe vault swung open. Inside, a golden giggle gem sat on a velvet cushion. They had each solved one.\nJordan looked at Kellan. Kellan looked at Barnaby. Barnaby looked at Jordan.\nAnd then all three of them started laughing at the exact same moment, because it turned out the hardest puzzle in seven hundred years was no match for a seven-year-old, a four-year-old, and a lost monster in their pajamas.\nThe gem glowed bright. Their second gem!", "choices": [{"text": "Head through the golden door to find the last gem", "next": "final_door_library"}]}, "word_storm": {"text": "The library shook. Books tumbled off shelves and the floating words started swirling faster and faster, crashing into each other.\n“Oh no,” groaned the Wordkeeper. “A Word Storm! When the words get scrambled, everything goes haywire!”\nScrambled words zoomed past them — PYHPA, NDSOU, GIGELG — spinning too fast for anyone to catch.\nKellan had an idea. He grabbed a butterfly net from a reading desk, climbed up a bookshelf like a little monkey — fast and fearless, his feet finding holds without looking — and started snatching scrambled words out of the air.\nHe tossed them down to Jordan, who unscrambled each one in her notebook.\n“PYHPA is HAPPY!” she called out. Every time she solved one, the word repaired itself and floated calmly back to its book.\nBarnaby tried to catch words too, but he kept accidentally swallowing them and then burping out silly phrases like “PURPLE BANANA TORNADO.” The Wordkeeper laughed so hard his pages ruffled.\nOne last scrambled word spun down from the ceiling: IRNFED.\nJordan unscrambled it in her notebook. She wrote the answer slowly.\n“Friend,” she said quietly. She meant it.\nThe word glowed gold, and from inside its light, a giggle gem appeared. Their second gem!", "choices": [{"text": "Head through the golden door to find the last gem", "next": "final_door_library"}]}, "final_door_pillow": {"text": "Two gems glowed warmly in Jordan’s backpack. Barnaby’s doorknob flickered a little brighter now, but it wasn’t enough — they needed one more.\nBarnaby pressed the doorknob against a pillow-tree, and one last door appeared. It was taller than all the others, made of dark golden wood, covered in swirling patterns that moved like they were alive.\n“This is a door to the Monster World,” Barnaby whispered, and his voice trembled. “My home. If we find the last giggle gem, I can finally go home.”\nJordan looked at Kellan. Kellan looked at Jordan. He nodded once — a small, serious nod.\nShe took a deep breath, grabbed Barnaby’s big fluffy paw, and opened the door.\nThe Monster World was beautiful. Rolling purple hills under a golden sky. Orange trees with glowing fruit. Friendly monsters of every shape and size walking and talking and laughing together.\nA group of them spotted Barnaby and came running.\n“BARNABY!” they shouted. “You’re HOME!”", "choices": [{"text": "Throw Barnaby a big welcome-home party", "next": "ending_parade"}, {"text": "Find a quiet spot to say a real goodbye", "next": "ending_starlight"}, {"text": "Try one last silly trick to find the gem", "next": "ending_tuesday"}]}, "final_door_tiny": {"text": "Two gems glowed in Jordan’s backpack. As Barnaby pressed his doorknob against a mushroom, they felt themselves stretch and grow back to their normal sizes.\nOne last door appeared — tall, golden, with swirling patterns that moved like living paint.\n“The Monster World,” Barnaby whispered. “Home. We still need one more gem.”\nJordan held his paw. Kellan stood up straight and tall — well, as tall as a four-year-old could stand, which was not especially tall, but the effort counted.\nThey stepped through together. Jordan’s grip tightened on Barnaby’s paw.\nPurple hills rolled out under a sky that glowed like the inside of a seashell. Trees with orange bark grew glowing fruit that hummed softly. Monsters of every color and shape strolled along stone paths.\nThen a group of them spotted Barnaby. Their faces lit up.\n“BARNABY!” they cheered, and came running with open arms.", "choices": [{"text": "Throw Barnaby a big welcome-home party", "next": "ending_parade"}, {"text": "Hold the gems together and make a wish", "next": "ending_forever_door"}, {"text": "Try one last silly trick to find the gem", "next": "ending_tuesday"}]}, "final_door_library": {"text": "Two gems glowed in Jordan’s backpack. The Wordkeeper bowed deeply as Barnaby pressed the doorknob against the tallest bookshelf.\nOne last door appeared — golden, tall, covered in swirling patterns that seemed to tell a story as they moved.\n“This leads to the Monster World,” said Barnaby softly. “My home. We need one more gem.”\nThe Wordkeeper handed Jordan a small, blank book with a leather cover.\n“A gift,” he said. “For the cleverest reader I have met in seven hundred years.”\nJordan held it carefully, like she was holding a very important test paper. She grabbed Barnaby’s paw. Kellan grabbed the other. They stepped through.\nThe Monster World was stunning — purple hills, golden sky, orange trees heavy with glowing fruit. Monsters of every kind wandered the paths, and when they saw Barnaby, they came running.\n“BARNABY! You made it home!”", "choices": [{"text": "Throw Barnaby a big welcome-home party", "next": "ending_parade"}, {"text": "Write their adventure into the magical book", "next": "ending_book"}, {"text": "Try one last silly trick to find the gem", "next": "ending_tuesday"}]}, "ending_parade": {"text": "The monsters threw the biggest, loudest, most spectacular welcome-home party the Monster World had ever seen. Monster musicians played drums made from barrels and horns made from giant seashells.\nKellan danced right along with them, wiggling and jumping and doing a move he called “the noodle” that made every monster howl.\nJordan stood up on a rock and told the whole crowd the story of their adventure. She was loud. She was dramatic. She was Jordan Bjers. She was seven years old. And she was one hundred percent committed to this.\nWhen she got to the part about finding Barnaby sitting on her rain boots, “completely, totally, absolutely lost” — she did the voice and everything — every single monster burst into laughter at the exact same time.\nA third giggle gem appeared, floating in the middle of the party like a golden firework. Barnaby’s doorknob blazed with bright, steady, golden light. He was home for good.\nThe monsters placed flower crowns on Jordan and Kellan’s heads and announced that they were now Honorary Monsters — the highest honor in the Monster World. Barnaby gave them both the biggest, fluffiest hug imaginable.\nThey stepped back through the golden door, which led right to Jordan’s closet. They climbed into their beds, still wearing their flower crowns.\nJordan fell asleep smiling. So did Kellan. So, on the other side of the door, did Barnaby.", "isEnding": true, "choices": []}, "ending_starlight": {"text": "Barnaby led them away from the crowd, up a quiet hill covered in soft purple grass. The Monster World’s sky was full of stars — but these stars were pink and gold, and they hummed a gentle melody, like a lullaby you almost recognized.\n“I don’t know how to find the last gem,” Barnaby said quietly, sitting down. “I just know that I’m really glad I came through the wrong door. Because I found you.”\nJordan sat down beside him. Even Kellan was quiet for a moment, which was saying something.\n“Barnaby,” Jordan said, in her most serious, most certain voice, “you are one of the kindest, silliest, most wonderful friends we have ever had.”\nBarnaby’s face crinkled. A chuckle. Then a laugh — a deep, rumbly, belly-shaking laugh that made his fur ripple. Jordan and Kellan laughed too, because Barnaby’s laugh was the kind you simply could not resist.\nRight there between the three of them, floating in the starlight, the third giggle gem appeared. Barnaby’s doorknob glowed steady and bright.\nHe reached into his fur and pulled out a small, warm, glowing star.\n“So you’ll always have a little light,” he said.\nJordan put it in her pajama pocket and held it tight. That night, she set the little star on her windowsill.\nIt still glows there. Every single night.", "isEnding": true, "choices": []}, "ending_tuesday": {"text": "“Wait,” said Kellan.\nHe stepped forward. He walked right up to the biggest, most serious-looking monster in the entire group — a tall, stern green monster with eight long arms folded across his chest and a face like a grumpy rock.\nEvery other monster watched.\nThen Kellan made the most ridiculous face he could possibly make. He crossed his eyes. He stuck out his tongue. He puffed out his cheeks like a blowfish. He wiggled his ears. He scrunched his nose.\nThe serious monster stared down at him. His mouth twitched. One arm trembled. Then two. Then all eight.\nAnd then — KABOOM — he exploded into the loudest, most thunderous laughter anyone had ever heard. Every monster joined in. Barnaby laughed hardest of all.\nThe third giggle gem burst into the air like a firework, showering everyone in warm golden sparkles. Barnaby’s doorknob blazed so bright it turned into a permanent golden glow.\n“It’s fully charged,” Barnaby gasped. “It will never run out again. That means I can visit you whenever I want!”\nJordan grinned.\n“How about every Tuesday?”\nAnd so, every Tuesday night, Jordan and Kellan hear a soft THUMP from the closet. They open the door, and there’s Barnaby — big and fluffy and smiling — ready for a brand new adventure.\nSome doors are meant to stay open.", "isEnding": true, "choices": []}, "ending_forever_door": {"text": "Jordan pulled both gems from her backpack and held them together in her cupped hands. They were warm. Almost alive.\n“Maybe we don’t need a third gem,” she said thoughtfully. “Maybe if we wish hard enough, what we have is enough.”\nKellan put his small hand on top of hers. Barnaby put his big, soft paw on top of Kellan’s. They closed their eyes.\nThey didn’t wish for magic, or power, or anything fancy. They just wished for this — for each other.\nThe two gems blazed with rainbow light, brighter and brighter, until they melted together into one magnificent crystal that pulsed with every color Jordan could name and a few she couldn’t.\nBarnaby’s doorknob absorbed the crystal and began to hum. A brand new door appeared on the hillside — half purple monster-wood, half regular closet door, like it belonged to both worlds at once.\n“We can visit anytime?” Kellan asked, his brown eyes enormous.\n“Anytime,” said Barnaby.\nThey hugged him goodnight and stepped through their special door. A whole world of adventures was always just one closet door away.\nKellan fell asleep in forty-five seconds. Jordan lasted almost two minutes. Both of them were smiling.", "isEnding": true, "choices": []}, "ending_book": {"text": "Jordan sat down on the purple hilltop, opened the blank book the Wordkeeper had given her, and pulled a pencil from her backpack.\n“What are you doing?” asked Barnaby.\n“Writing our story,” said Jordan.\nShe wrote about the thumping in the closet. The big fluffy monster who was lost. Every golden door they opened, every strange new world on the other side, every laugh that turned into a glowing gem. She wrote about Kellan being brave and Barnaby being silly and how the three of them became the best of friends.\nAs she wrote, the words lifted off the pages and floated into the air, glowing gold. They swirled around the three of them like fireflies.\nAnd from inside that swirl of words and warmth and story, the third giggle gem appeared. Barnaby’s doorknob blazed to life.\nHe held the glowing book against his chest.\n“I’ll keep this in the Library,” he said, his eyes shining. “So whenever I miss you, I can read it.”\n“I’ll write more,” said Jordan. “I’ll write so many stories you’ll need a whole shelf.”\nThey hugged him tight and stepped through the golden door.\nThat night, for the first time, Jordan dreamed of a story she hadn’t written yet. The next adventure. Waiting to begin.", "isEnding": true, "choices": []}}};

var HERO = STORY.heroName || "the hero";
var COLORS = ["#1A3A0F","#7C1D35","#1A2E5A"];
var cid = "start", hist = [], started = false;
var app = document.getElementById("app");
var endingCount = Object.values(STORY.passages).filter(function(p){return p.isEnding}).length;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function go(id){hist.push(cid);cid=id;render();window.scrollTo({top:0,behavior:"smooth"});}
function back(){if(!hist.length)return;cid=hist.pop();render();window.scrollTo({top:0,behavior:"smooth"});}
function restart(){cid="start";hist=[];started=false;render();window.scrollTo({top:0,behavior:"smooth"});}
function begin(){started=true;render();}

function render(){
  if(!started){renderTitle();return;}
  var p=STORY.passages[cid];
  if(!p){app.innerHTML="<p>Oops! Something went wrong.</p>";return;}
  var isEnd=p.isEnding||!p.choices||!p.choices.length;
  var isSingle=!isEnd&&p.choices.length===1;
  var pg=hist.length+1;
  var totalEst=Object.keys(STORY.passages).length;
  var pct=Math.min(100,(hist.length/(totalEst*0.6))*100).toFixed(1);
  var img=IMAGES[cid]||"";
  var imgH=img
    ?'<div class="imgbox"><img src="'+esc(img)+'" alt="" onerror="this.parentElement.style.display=\'none\'"></div>'
    :'<div class="imgph"><div class="iph-i">&#128444;</div><div class="iph-t">Illustration coming soon</div></div>';
  var chH="";
  if(isEnd){
    chH='<div class="end-acts"><button class="btn-rs" onclick="restart()">&#8635; Start Over</button><button class="btn-bk" onclick="back()">&#8592; Go Back</button></div>';
  }else if(isSingle){
    chH='<button class="btn-cont" onclick="go(\''+esc(p.choices[0].next)+'\')">'+esc(p.choices[0].text)+'</button>';
  }else{
    var btns=p.choices.map(function(c,i){
      return '<button class="cbtn" style="background:'+COLORS[i%3]+'" onclick="go(\''+esc(c.next)+'\')"><span class="cnum">'+(i+1)+'</span>'+esc(c.text)+'</button>';
    }).join("");
    chH='<div class="clabel">What does '+esc(HERO)+' do?</div><div class="choices">'+btns+'</div>';
  }
  var bkBtn=(hist.length>0&&!isEnd)?'<button class="bnav" onclick="back()">&#8592;</button>':"";
  var chapLbl=(cid==="start")?'<div class="chap">'+esc(STORY.title)+'</div>':"";
  var endFt=isEnd?'<div class="endf"><div class="endstar">&#11088; The End &#11088;</div><div class="endnote">There are '+endingCount+' different endings &mdash; can you find them all?</div></div>':"";
  app.innerHTML='<div class="reader"><div class="topbar"><button class="bnav" onclick="restart()">&#127968;</button>'+bkBtn+'<div class="pw"><div class="stitle">'+esc(STORY.title)+'</div><div class="ptrack"><div class="pfill" style="width:'+pct+'%"></div></div></div></div><div class="pbw"><div class="pb">'+pg+'</div></div>'+imgH+'<div class="scard">'+chapLbl+'<div class="stxt">'+esc(p.text).replace(/\n/g,"<br><br>")+'</div>'+endFt+'</div>'+chH+'</div>';
}

function renderTitle(){
  app.innerHTML='<div class="title-scr"><div class="tstar">&#11088;</div><div class="tlabel">A Choose Your Own Adventure Story</div><h1 class="ttitle">'+esc(STORY.title)+'</h1><div class="tdiv"></div><div class="tded">'+esc(STORY.dedication)+'</div><div class="thow"><strong>How to read:</strong> Pick the choice YOU would make. Each one leads somewhere different. There are '+endingCount+' endings \u2014 can you find them all?</div><button class="tbtn" onclick="begin()">&#10024; Begin the Adventure!</button></div>';
}

render();
</script>
</body>
</html>
