<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>StoryForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ STORIES — Edit this section to add/remove books ═══ */
/* Books are defined in the JS below. To add a new story:
   1. Add an entry to the BOOKS array in the <script> section
   2. Set the url to the story's HTML file
   3. Pick an emoji and accent color
   That's it — the page builds itself. */

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --pink:#E84393;
  --pink-light:#FD79A8;
  --pink-pale:#FFE0ED;
  --purple:#6C5CE7;
  --purple-deep:#4A3AB5;
  --purple-pale:#DDD6FE;
  --teal:#00CEC9;
  --teal-deep:#00A8A3;
  --teal-pale:#BFFFFE;
  --cream:#FFFDF7;
  --text:#2D1B4E;
  --text-mid:#5B4380;
  --text-light:#8B7BAA;
  --card-shadow:0 8px 32px rgba(108,92,231,.15),0 2px 8px rgba(232,67,147,.1);
}

body{
  min-height:100vh;min-height:100dvh;
  background:var(--cream);
  font-family:'Quicksand',sans-serif;
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
}

/* ═══ Background magic ═══ */
.bg-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:drift 18s ease-in-out infinite}
.orb-1{width:400px;height:400px;background:var(--pink-light);top:-10%;left:-5%;animation-delay:0s}
.orb-2{width:350px;height:350px;background:var(--purple);top:30%;right:-8%;animation-delay:-6s}
.orb-3{width:300px;height:300px;background:var(--teal);bottom:-5%;left:20%;animation-delay:-12s}
.orb-4{width:250px;height:250px;background:var(--purple-pale);top:60%;left:50%;animation-delay:-4s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

/* ═══ Content ═══ */
.page{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* ═══ Header ═══ */
.header{text-align:center;padding:1.5rem 0 2rem}
.header-star{font-size:56px;line-height:1;margin-bottom:.75rem;animation:float 3.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.header-label{
  font-family:'Baloo 2',cursive;font-size:.8rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--pink);margin-bottom:.25rem;
}
.header-title{
  font-family:'Baloo 2',cursive;font-size:clamp(2rem,7vw,3rem);
  background:linear-gradient(135deg,var(--purple),var(--pink),var(--teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1.15;margin-bottom:.75rem;
}
.header-sub{
  font-size:1rem;color:var(--text-mid);line-height:1.6;max-width:420px;margin:0 auto;
}
.header-sub strong{color:var(--purple)}

/* ═══ Book Cards ═══ */
.shelf{display:flex;flex-direction:column;gap:1.25rem;margin-top:1rem}

.book{
  display:block;text-decoration:none;color:inherit;
  background:white;border-radius:22px;padding:1.5rem;
  border:2px solid transparent;
  box-shadow:var(--card-shadow);
  transition:all .25s ease;
  cursor:pointer;position:relative;overflow:hidden;
}
.book::before{
  content:'';position:absolute;inset:0;border-radius:22px;padding:2px;
  background:linear-gradient(135deg,var(--purple-pale),var(--pink-pale),var(--teal-pale));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  opacity:0;transition:opacity .25s;
}
.book:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(108,92,231,.2),0 4px 12px rgba(232,67,147,.15)}
.book:hover::before{opacity:1}
.book:active{transform:translateY(-2px) scale(.99)}

.book-inner{display:flex;align-items:center;gap:1.25rem}

.book-icon{
  width:72px;height:72px;border-radius:18px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;position:relative;
}
.book-icon::after{
  content:'';position:absolute;inset:0;border-radius:18px;
  background:inherit;filter:blur(12px);opacity:.3;z-index:-1;
}

.book-info{flex:1;min-width:0}
.book-num{
  font-family:'Baloo 2',cursive;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:.15rem;
}
.book-title{
  font-family:'Baloo 2',cursive;font-size:clamp(1.1rem,3.5vw,1.35rem);
  line-height:1.2;margin-bottom:.35rem;color:var(--text);
}
.book-desc{
  font-size:.85rem;color:var(--text-light);line-height:1.5;
}

.book-arrow{
  flex-shrink:0;width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;color:white;transition:transform .2s;
}
.book:hover .book-arrow{transform:translateX(3px)}

/* Coming soon variant */
.book-soon{opacity:.55;pointer-events:none}
.book-soon .book-title{color:var(--text-light)}
.book-soon .book-arrow{display:none}
.book-soon-tag{
  display:inline-block;font-family:'Baloo 2',cursive;font-size:.65rem;
  letter-spacing:.08em;text-transform:uppercase;
  background:var(--purple-pale);color:var(--purple);
  padding:.15rem .6rem;border-radius:6px;margin-top:.35rem;
}

/* ═══ Footer ═══ */
.footer{text-align:center;margin-top:3rem;padding-top:1.5rem;border-top:2px solid var(--purple-pale)}
.footer-text{font-size:.8rem;color:var(--text-light);line-height:1.7}
.footer-text strong{color:var(--purple)}
.footer-heart{color:var(--pink);font-size:1.2rem;margin-top:.5rem;display:block}

/* ═══ Animations ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.book{animation:fadeUp .5s ease backwards}
.book:nth-child(1){animation-delay:.1s}
.book:nth-child(2){animation-delay:.2s}
.book:nth-child(3){animation-delay:.3s}
.book:nth-child(4){animation-delay:.4s}
.book:nth-child(5){animation-delay:.5s}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>

<div class="page">
  <header class="header">
    <div class="header-star">✨</div>
    <div class="header-label">Welcome to</div>
    <h1 class="header-title">StoryForge</h1>
    <p class="header-sub">Choose-your-own-adventure stories starring <strong>Jordan</strong> and <strong>Kellan</strong>. Pick a book and start reading!</p>
  </header>

  <div class="shelf" id="shelf"></div>

  <footer class="footer">
    <div class="footer-text">Made with love for <strong>Jordan</strong></div>
    <span class="footer-heart">💜</span>
  </footer>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// BOOKS — Add your stories here
// ══════════════════════════════════════════════════════════════
// To add a new book:
//   1. Copy one of the entries below
//   2. Update the title, description, emoji, url, and colors
//   3. Set comingSoon: false when the story is ready
//
// url should be the path to the story's HTML file
// (e.g., "jordan-bjers-huntrx-secret.html" if it's in the same folder)
// ══════════════════════════════════════════════════════════════

var BOOKS = [
  {
    num: "Book 1",
    title: "The Monster in Jordan's Closet",
    desc: "Something is scratching behind the closet door. Jordan is NOT scared. Mostly.",
    emoji: "👻",
    url: "stories/the-monster-in-jordans-closet/index.html",
    iconBg: "linear-gradient(135deg, #6C5CE7, #A29BFE)",
    arrowBg: "#6C5CE7",
    numColor: "#6C5CE7",
    comingSoon: true
  },
  {
    num: "Book 2",
    title: "Jordan Bjers and the HUNTR/X Secret",
    desc: "HUNTR/X is at the school party. There's a shadow demon. Jordan has a plan.",
    emoji: "⭐",
    url: "stories/jordan-bjers-huntrx-secret/index.html",
    iconBg: "linear-gradient(135deg, #E84393, #FD79A8)",
    arrowBg: "#E84393",
    numColor: "#E84393",
    comingSoon: false
  },
  {
    num: "Book 3",
    title: "Coming Soon",
    desc: "A new adventure is on the way...",
    emoji: "📖",
    url: "#",
    iconBg: "linear-gradient(135deg, #00CEC9, #81ECEC)",
    arrowBg: "#00CEC9",
    numColor: "#00CEC9",
    comingSoon: true
  }
];

// ══════════════════════════════════════════════════════════════
// ENGINE — builds the shelf from the BOOKS array
// ══════════════════════════════════════════════════════════════

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

var shelf = document.getElementById("shelf");

BOOKS.forEach(function(b){
  var isSoon = b.comingSoon;
  var el = document.createElement(isSoon ? "div" : "a");
  if(!isSoon) el.href = b.url;
  el.className = "book" + (isSoon ? " book-soon" : "");
  
  var soonTag = isSoon ? '<div class="book-soon-tag">Coming Soon</div>' : '';
  var arrow = '<div class="book-arrow" style="background:'+b.arrowBg+'">→</div>';
  
  el.innerHTML = '<div class="book-inner">'
    + '<div class="book-icon" style="background:'+b.iconBg+'">'+b.emoji+'</div>'
    + '<div class="book-info">'
    + '<div class="book-num" style="color:'+b.numColor+'">'+esc(b.num)+'</div>'
    + '<div class="book-title">'+esc(b.title)+'</div>'
    + '<div class="book-desc">'+esc(b.desc)+'</div>'
    + soonTag
    + '</div>'
    + arrow
    + '</div>';
  
  shelf.appendChild(el);
});
</script>
</body>
</html>
